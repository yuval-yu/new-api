interval: "5m"       # 巡检间隔，可写成 "30s"、"1m"、"5m" 等
slow_latency: "10s"   # 慢请求阈值，超过则从绿降为黄

# 最大并发探测数
max_concurrency: 15

# 错峰调度
stagger_probes: true

# 存储配置（SQLite）
storage:
  type: "sqlite"
  sqlite:
    path: "monitor.db"   # 实际路径由环境变量 MONITOR_SQLITE_PATH 覆盖为 /data/monitor.db

# 标签系统
enable_annotations: true

# ============================================
# 监测任务配置 —— 请按实际情况修改
# ============================================
#
# 支持的模板（templates/ 目录）：
#   CC (Claude Code): cc-haiku-arith, cc-sonnet-arith, cc-opus-arith
#   CX (Codex):       cx-codex-arith, cx-gpt-arith
#   GM (Gemini):      gm-flash-arith, gm-pro-arith
#
# 占位符说明：
#   {{BASE_URL}}   — 来自 base_url
#   {{API_KEY}}    — 来自 api_key（或环境变量）
#   {{MODEL}}      — 来自 model / request_model
#
