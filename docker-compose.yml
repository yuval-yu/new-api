# New-API Docker Compose Configuration
# 
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line 15
#   2. Uncomment the mysql service and SQL_DSN line 16
#   3. Uncomment mysql in depends_on (line 28)
#   4. Uncomment mysql_data in volumes section (line 64)
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=root:oHNcZkDvUIQxay3v6pcjqA@tcp(mysql:3306)/new-api
      - LOG_SQL_DSN=postgres://newapi:EtZGo2Qokxh2Y4SKL0iJhA@postgres-log:5432/newapi_log
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
#      - STREAMING_TIMEOUT=300
#      - SESSION_SECRET=random_string  # 多机部署时必须修改！
#      - SYNC_FREQUENCY=60
    depends_on:
      - redis
      - mysql
      - postgres-log
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - new-api-network

  mysql:
    image: mysql:8.2
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: oHNcZkDvUIQxay3v6pcjqA
      MYSQL_DATABASE: new-api
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - new-api-network
#    ports:
#      - "3306:3306"

  postgres-log:
    image: postgres:16-alpine
    container_name: postgres-log
    restart: always
    environment:
      POSTGRES_USER: newapi
      POSTGRES_PASSWORD: EtZGo2Qokxh2Y4SKL0iJhA
      POSTGRES_DB: newapi_log
    volumes:
      - pg_log_data:/var/lib/postgresql/data
    networks:
      - new-api-network
#    ports:
#      - "5432:5432"

volumes:
  mysql_data:
  pg_log_data:

networks:
  new-api-network:
    driver: bridge
